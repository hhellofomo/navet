name: Navet
version: "0.7.9"
slug: navet
description: Modern smart home dashboard for Home Assistant
url: https://github.com/awesomestvi/navet
image: ghcr.io/awesomestvi/{arch}-navet-addon
arch:
  - aarch64
  - amd64
startup: application
init: false
ingress: true
ingress_port: 8099
homeassistant_api: true
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Optional direct Navet dashboard access
panel_icon: mdi:hub
panel_title: Navet
map:
  - addon_config:rw
options:
  dashboard_config_url: ""
  homey_client_id: ""
  homey_client_secret: ""
  homey_redirect_uri: ""
schema:
  dashboard_config_url: str?
  homey_client_id: str?
  homey_client_secret: password?
  homey_redirect_uri: str?
  hass_url: str?
  token: password?
