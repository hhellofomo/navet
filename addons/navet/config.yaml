name: Navet
version: "0.4.5"
slug: navet
description: Modern smart home dashboard for Home Assistant
url: https://github.com/awesomestvi/navet
image: ghcr.io/awesomestvi/{arch}-navet-addon
arch:
  - aarch64
  - amd64
startup: application
init: false
ingress: true
ingress_port: 8099
homeassistant_api: true
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Optional direct Navet dashboard access
panel_icon: mdi:view-dashboard
panel_title: Navet
map:
  - addon_config:rw
options:
  dashboard_config_url: ""
schema:
  dashboard_config_url: str?
  hass_url: str?
  token: password?
