load_module /usr/lib/nginx/modules/ngx_http_js_module.so;

user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/octet-stream
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  js_path /etc/nginx/njs/;
  js_import navet_rss_proxy from /etc/nginx/njs/rss-proxy.js;
  js_import navet_profile_store from /etc/nginx/njs/profile-store.js;
  js_import navet_auth_store from /etc/nginx/njs/auth-store.js;
  js_import navet_openhab_store from /etc/nginx/njs/openhab-store.js;
  js_import navet_openhab_proxy from /etc/nginx/njs/openhab-proxy.js;
  js_fetch_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
  js_fetch_timeout 10s;
  resolver 1.1.1.1 8.8.8.8 ipv6=off;

  include /etc/nginx/http.d/*.conf;
}
