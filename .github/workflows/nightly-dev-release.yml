name: Bump Navet Dev Nightly Version

on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: nightly-dev-release
  cancel-in-progress: true

jobs:
  bump-dev-version:
    name: Bump Navet Dev nightly version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compute nightly version
        id: nightly
        run: |
          PACKAGE_VERSION=$(node -p 'JSON.parse(require("node:fs").readFileSync("package.json", "utf8")).version')
          NIGHTLY_DATE=$(date -u +%Y%m%d)
          echo "value=${PACKAGE_VERSION}-dev.${NIGHTLY_DATE}" >> "$GITHUB_OUTPUT"

      - name: Update Navet Dev add-on version
        env:
          NIGHTLY_VERSION: ${{ steps.nightly.outputs.value }}
        run: |
          node --input-type=module -e 'import fs from "node:fs"; const filePath = "platform/home-assistant/addons/navet-dev/config.yaml"; const content = fs.readFileSync(filePath, "utf8"); const replacement = `version: "${process.env.NIGHTLY_VERSION}"`; const nextContent = content.replace(/^version:\s*"?.*?"?\s*$/m, replacement); if (nextContent === content) { process.exit(0); } fs.writeFileSync(filePath, nextContent, "utf8");'

      - name: Commit nightly version bump
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add platform/home-assistant/addons/navet-dev/config.yaml
          if git diff --cached --quiet; then
            echo "Navet Dev add-on version is already current."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(ci): bump Navet Dev nightly version"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Capture build metadata
        if: steps.commit.outputs.changed == 'true'
        id: metadata
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.commit.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.commit.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.commit.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 nightly add-on image
        if: steps.commit.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./platform/home-assistant/addons/navet/Dockerfile
          platforms: linux/amd64
          push: true
          cache-from: type=gha,scope=navet-addon-amd64
          cache-to: type=gha,mode=max,scope=navet-addon-amd64
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.20
            BUILD_VERSION=${{ steps.nightly.outputs.value }}
            BUILD_ARCH=amd64
            NAVET_GIT_SHA=${{ steps.commit.outputs.sha }}
            NAVET_BUILD_DATE=${{ steps.metadata.outputs.build_date }}
            NAVET_RELEASE_CHANNEL=edge
          tags: |
            ghcr.io/${{ github.repository_owner }}/amd64-navet-addon:${{ steps.nightly.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/amd64-navet-addon:edge
            ghcr.io/${{ github.repository_owner }}/amd64-navet-addon:dev
            ghcr.io/${{ github.repository_owner }}/amd64-navet-addon:sha-${{ steps.commit.outputs.short_sha }}

      - name: Build and push aarch64 nightly add-on image
        if: steps.commit.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./platform/home-assistant/addons/navet/Dockerfile
          platforms: linux/arm64
          push: true
          cache-from: type=gha,scope=navet-addon-aarch64
          cache-to: type=gha,mode=max,scope=navet-addon-aarch64
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/aarch64-base:3.20
            BUILD_VERSION=${{ steps.nightly.outputs.value }}
            BUILD_ARCH=aarch64
            NAVET_GIT_SHA=${{ steps.commit.outputs.sha }}
            NAVET_BUILD_DATE=${{ steps.metadata.outputs.build_date }}
            NAVET_RELEASE_CHANNEL=edge
          tags: |
            ghcr.io/${{ github.repository_owner }}/aarch64-navet-addon:${{ steps.nightly.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/aarch64-navet-addon:edge
            ghcr.io/${{ github.repository_owner }}/aarch64-navet-addon:dev
            ghcr.io/${{ github.repository_owner }}/aarch64-navet-addon:sha-${{ steps.commit.outputs.short_sha }}

      - name: Push nightly version bump commit
        if: steps.commit.outputs.changed == 'true'
        run: git push origin HEAD:main
