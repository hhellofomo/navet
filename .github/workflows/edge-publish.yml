name: Publish Dev Builds

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write

concurrency:
  group: edge-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/navet

jobs:
  tier-1-release-critical:
    name: Release Safety Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tier 1 release-critical tests
        run: pnpm test:tier1

      - name: Check provider boundaries
        run: node scripts/check-provider-boundaries.mjs

      - name: Validate Docker build and config
        run: pnpm check:docker

  prepare-dev-release:
    name: Prepare Dev Release
    runs-on: ubuntu-latest
    needs: tier-1-release-critical
    outputs:
      dev_version: ${{ steps.dev_version.outputs.value }}
      release_sha: ${{ steps.release_sha.outputs.value }}
      release_sha_short: ${{ steps.release_sha_short.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compute dev version
        id: dev_version
        run: |
          PACKAGE_VERSION=$(node -p 'JSON.parse(require("node:fs").readFileSync("package.json", "utf8")).version')
          DEV_VERSION="${PACKAGE_VERSION}-dev.$(date -u +%Y%m%d.%H%M%S)"
          if [[ ! "$DEV_VERSION" =~ ^${PACKAGE_VERSION//./\\.}-dev\.[0-9]{8}\.[0-9]{6}$ ]]; then
            echo "Expected computed Navet Dev add-on version to match ${PACKAGE_VERSION}-dev.YYYYMMDD.HHMMSS but received: $DEV_VERSION"
            exit 1
          fi
          echo "value=$DEV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Capture release sha
        id: release_sha
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Capture short release sha
        id: release_sha_short
        run: echo "value=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

  publish-standalone:
    name: Publish Navet App
    runs-on: ubuntu-latest
    needs:
      - tier-1-release-critical
      - prepare-dev-release
    environment: edge

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-dev-release.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read package version
        id: version
        run: echo "value=$(node -p 'JSON.parse(require(\"node:fs\").readFileSync(\"package.json\", \"utf8\")).version')" >> "$GITHUB_OUTPUT"

      - name: Capture build metadata
        id: metadata
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve standalone edge tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          {
            echo "value<<EOF"
            echo "$IMAGE:edge"
            echo "$IMAGE:dev"
            echo "$IMAGE:sha-${{ needs.prepare-dev-release.outputs.release_sha_short }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push standalone edge image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=navet-standalone
          cache-to: type=gha,mode=max,scope=navet-standalone
          tags: ${{ steps.tags.outputs.value }}
          build-args: |
            NAVET_VERSION=${{ steps.version.outputs.value }}
            NAVET_GIT_SHA=${{ needs.prepare-dev-release.outputs.release_sha }}
            NAVET_BUILD_DATE=${{ steps.metadata.outputs.build_date }}
            NAVET_RELEASE_CHANNEL=edge
            NAVET_BUILD_VERSION=${{ needs.prepare-dev-release.outputs.dev_version }}

  publish-addon:
    name: Publish Home Assistant Add-on (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs:
      - tier-1-release-critical
      - prepare-dev-release
    environment: edge
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-dev-release.outputs.release_sha }}

      - name: Resolve add-on build target
        id: target
        run: |
          case "${{ matrix.arch }}" in
            amd64)
              echo "platform=linux/amd64" >> "$GITHUB_OUTPUT"
              echo "build_from=ghcr.io/home-assistant/amd64-base:3.20" >> "$GITHUB_OUTPUT"
              ;;
            aarch64)
              echo "platform=linux/arm64" >> "$GITHUB_OUTPUT"
              echo "build_from=ghcr.io/home-assistant/aarch64-base:3.20" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported architecture: ${{ matrix.arch }}"
              exit 1
              ;;
          esac

      - name: Capture build metadata
        id: metadata
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve add-on edge tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-navet-addon"
          VERSION="${{ needs.prepare-dev-release.outputs.dev_version }}"
          {
            echo "value<<EOF"
            echo "$IMAGE:$VERSION"
            echo "$IMAGE:edge"
            echo "$IMAGE:dev"
            echo "$IMAGE:sha-${{ needs.prepare-dev-release.outputs.release_sha_short }}"
            echo "EOF"
            echo "build_version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push add-on edge image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./platform/home-assistant/addons/navet/Dockerfile
          platforms: ${{ steps.target.outputs.platform }}
          push: true
          cache-from: type=gha,scope=navet-addon-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=navet-addon-${{ matrix.arch }}
          build-args: |
            BUILD_FROM=${{ steps.target.outputs.build_from }}
            BUILD_VERSION=${{ steps.tags.outputs.build_version }}
            BUILD_ARCH=${{ matrix.arch }}
            NAVET_GIT_SHA=${{ needs.prepare-dev-release.outputs.release_sha }}
            NAVET_BUILD_DATE=${{ steps.metadata.outputs.build_date }}
            NAVET_RELEASE_CHANNEL=edge
            NAVET_BUILD_VERSION=${{ steps.tags.outputs.build_version }}
          tags: ${{ steps.tags.outputs.value }}
