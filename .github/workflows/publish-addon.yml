name: Publish Home Assistant Add-on

on:
  workflow_dispatch:
  # Re-enable the push trigger when the add-on image pipeline should publish on every main push.
  # push:
  #   branches:
  #     - main

permissions:
  contents: read
  packages: write

jobs:
  publish-addon:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.20
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base:3.20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version
        id: version
        run: |
          VERSION=$(sed -n 's/^version: "\(.*\)"/\1/p' addons/navet/config.yaml)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push add-on image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./addons/navet/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_VERSION=${{ steps.version.outputs.value }}
            BUILD_ARCH=${{ matrix.arch }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-navet-addon:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-navet-addon:latest
