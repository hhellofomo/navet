name: Deploy demo and Storybook to Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/pages-demo.yml'
      - '.storybook/**'
      - 'demo/**'
      - 'docs/marketing/assets/screenshots/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'public/demo/**'
      - 'src/app/marketing/**'
      - 'src/**/*.stories.*'
      - 'src/app/demo/**'
      - 'src/app/storybook/**'
      - 'src/app/ui-kit/**'
      - 'src/main.tsx'
      - 'src/website/**'
      - 'src/styles/**'
      - 'vite.config.ts'
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pinned pnpm
        run: corepack install

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website and demo
        run: NAVET_BUILD_TARGET=all pnpm exec vite build --base=/navet/

      - name: Build Storybook
        run: pnpm storybook:build

      - name: Stage Pages artifact
        run: |
          mv dist pages
          mv pages/website/index.html pages/index.html
          rmdir pages/website
          mv .cache/storybook-static pages/storybook
          mkdir -p pages/install pages/roadmap
          cp pages/index.html pages/install/index.html
          cp pages/index.html pages/roadmap/index.html
          for section in energy security tasks locks lights media settings; do
            mkdir -p "pages/demo/${section}"
            cp pages/demo/index.html "pages/demo/${section}/index.html"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}demo/
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
