name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to release, for example v0.1.0-beta.1
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          echo "value=$TAG" >> "$GITHUB_OUTPUT"

          if echo "$TAG" | grep -Eq -- '-(beta|alpha|rc)\.'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          VERSION="${TAG#v}"

          {
            echo "body<<EOF"
            echo "## Navet $VERSION"
            echo
            echo "- Release tag: \`$TAG\`"
            echo "- Package version: \`$VERSION\`"
            echo
            echo "See [docs/VERSIONING.md](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/docs/VERSIONING.md) for the current release policy."
            echo
            echo "### Container Publishing"
            echo
            echo "- App images: trigger [Publish](https://github.com/${{ github.repository }}/actions/workflows/publish.yml) if you want a matching manual image tag."
            echo "- Home Assistant add-on images: trigger [Publish Home Assistant Add-on](https://github.com/${{ github.repository }}/actions/workflows/publish-addon.yml) after bumping \`addons/navet/config.yaml\`."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          generate_release_notes: true
