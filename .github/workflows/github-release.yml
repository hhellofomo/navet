name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to release, for example v0.1.0-beta.1
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          echo "value=$TAG" >> "$GITHUB_OUTPUT"

          if [[ "$TAG" == *-alpha.* || "$TAG" == *-beta.* || "$TAG" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          NOTES_FILE="${RUNNER_TEMP}/navet-release-notes.md"

          node scripts/extract-release-notes.mjs "$TAG" > "$NOTES_FILE"

          {
            echo "body<<RELEASE_NOTES"
            cat "$NOTES_FILE"
            echo "RELEASE_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          generate_release_notes: false
