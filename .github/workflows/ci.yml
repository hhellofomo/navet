name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_call:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pinned pnpm
        run: corepack install

      - name: Verify pnpm
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm check

      - name: Validate Storybook standards
        run: pnpm check:stories

      - name: Validate UI kit boundaries
        run: pnpm check:ui-kit

      - name: Typecheck
        run: pnpm typecheck

      - name: Build app
        run: pnpm build

      - name: Build Home Assistant panel
        run: pnpm build:ha-panel

      - name: Verify committed Home Assistant panel assets
        run: git diff --exit-code -- custom_components/navet/frontend

  tier-1-release-critical:
    uses: ./.github/workflows/provider-platform-validation.yml

  tier-2-blocking-app-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pinned pnpm
        run: corepack install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tier 2 blocking app-contract tests
        run: pnpm test:tier2

  tier-3-broad-regression:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pinned pnpm
        run: corepack install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tier 3 broad regression tests
        run: pnpm test:tier3
