server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  include /etc/nginx/snippets/navet-security-headers.conf;

  location = /config.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  include /etc/nginx/snippets/navet-rss-proxy.conf;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
