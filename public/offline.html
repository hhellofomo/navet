<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Navet Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 36%),
          linear-gradient(180deg, #111827, #020617 58%, #000000);
        color: #ffffff;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(100%, 420px);
        padding: 28px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(15, 23, 42, 0.72);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.76);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Navet is offline</h1>
      <p>The app shell is still available, but live Home Assistant data needs a connection.</p>
    </main>
  </body>
</html>
